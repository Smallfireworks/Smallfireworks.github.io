        async function decryptPage() {
            const password = document.getElementById('password').value;
            const statusEl = document.getElementById('status');
            statusEl.textContent = '';

            if (!password) {
                statusEl.textContent = '请输入密码！';
                return;
            }

            try {
                const dataBytes = CryptoJS.enc.Base64.parse(encryptedData);
                
                // 从数据中分离 盐(salt)、初始化向量(iv) 和 密文(ciphertext)
                const salt = CryptoJS.lib.WordArray.create(Array.prototype.slice.call(dataBytes.words, 0, 4));
                const iv = CryptoJS.lib.WordArray.create(Array.prototype.slice.call(dataBytes.words, 4, 8));
                const ciphertext = CryptoJS.lib.WordArray.create(Array.prototype.slice.call(dataBytes.words, 8));

                const key = CryptoJS.PBKDF2(password, salt, {
                    keySize: 32 / 4,
                    iterations: 100000,
                    hasher: CryptoJS.algo.SHA256
                });

                const decrypted = CryptoJS.AES.decrypt({ ciphertext: ciphertext }, key, {
                    iv: iv,
                    mode: CryptoJS.mode.CBC,
                    padding: CryptoJS.pad.Pkcs7
                });

                const decryptedText = decrypted.toString(CryptoJS.enc.Utf8);

                if (decryptedText) {
                    // --- 这是修复的关键 ---
                    // 使用 document.write() 来用解密后的内容完全重写当前页面
                    // 这可以正确渲染一个完整的HTML文档
                    document.open();
                    document.write(decryptedText);
                    document.close();
                    // -----------------------
                } else {
                    throw new Error("密码错误或数据损坏");
                }

            } catch (e) {
                console.error("解密失败:", e);
                statusEl.textContent = '密码错误！';
            }
        }
        
        document.getElementById('password').addEventListener('keyup', function(event) {
            if (event.key === "Enter") {
                decryptPage();
            }
        });
    </script>
